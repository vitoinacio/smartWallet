name: "Refinar Docs"
description: "Versiona um documento existente em docs/business/: seleciona o doc → propõe delta → cria nova versão preservando o original."
version: "1.0.0"
estimated_docs: 1

steps:
  - id: 01-gate-integridade
    name: "Verificação de Integridade"
    execution: checkpoint
    gate: GATE-0
    file: pipeline/steps/01-gate-integridade.md

  - id: rf-02-selecionar
    name: "Selecionar Doc e Escopo da Mudança"
    execution: checkpoint
    file: pipeline/steps/rf-02-selecionar.md
    depends_on: [01-gate-integridade]

  - id: rf-03-delta
    name: "Analisar Delta e Propor Mudança"
    agent: ana-analise
    execution: subagent
    model_tier: powerful
    file: pipeline/steps/rf-03-delta.md
    depends_on: [rf-02-selecionar]

  - id: rf-04-criar-versao
    name: "Criar Versão e Registrar"
    agent: tania-tecnica
    execution: subagent
    model_tier: fast
    file: pipeline/steps/rf-04-criar-versao.md
    depends_on: [rf-03-delta]
