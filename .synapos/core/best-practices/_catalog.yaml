version: "1.1.0"
description: "Catálogo de boas práticas do Synapos — carregue apenas o relevante"

catalog:
  # Desenvolvimento
  - id: code-review
    file: dev/code-review.md
    whenToUse: "Quando o squad faz review de código em qualquer linguagem"
    domains: [frontend, backend, fullstack, mobile]

  - id: testing-strategy
    file: dev/testing-strategy.md
    whenToUse: "Quando o squad escreve ou define estratégia de testes"
    domains: [frontend, backend, fullstack, mobile]

  - id: api-design
    file: dev/api-design.md
    whenToUse: "Quando o squad projeta ou documenta APIs REST ou GraphQL"
    domains: [backend, fullstack]

  - id: git-workflow
    file: dev/git-workflow.md
    whenToUse: "Quando o squad trabalha com branches, commits e PRs"
    domains: [frontend, backend, fullstack, mobile, devops]

  # Produto
  - id: product-spec
    file: product/product-spec.md
    whenToUse: "Quando o squad de produto escreve especificações"
    domains: [produto]

  - id: user-research
    file: product/user-research.md
    whenToUse: "Quando o squad realiza pesquisa de usuário ou mercado"
    domains: [produto]

  - id: technical-writing
    file: product/technical-writing.md
    whenToUse: "Quando o squad produz documentação técnica ou de produto"
    domains: [produto, backend, frontend]

  # Conteúdo (herdado do OpenSquad)
  - id: copywriting
    file: content/copywriting.md
    whenToUse: "Quando o squad cria textos persuasivos para qualquer canal"
    domains: [custom]

  - id: linkedin-post
    file: content/linkedin-post.md
    whenToUse: "Quando o squad cria posts para LinkedIn"
    domains: [custom]

  - id: blog-post
    file: content/blog-post.md
    whenToUse: "Quando o squad escreve artigos para blog"
    domains: [custom]
